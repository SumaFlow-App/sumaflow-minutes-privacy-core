name: sumaflow_minutes_privacy_core
description: >-
  Privacy-critical modules of SumaFlow Minutes — open-sourced under MIT
  so the privacy contract (PRD §5) is verifiable.
version: 0.1.0
homepage: https://github.com/SumaFlow-App/sumaflow-minutes-privacy-core
# Consumed by the main app (private repo) via a pinned git `ref`, not a
# path dependency. Not on pub.dev yet — revisit if the privacy-core gets
# external contributors.
publish_to: 'none'

environment:
  sdk: ^3.11.3
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1  # ForegroundServiceBridge + crypto/key providers — matches main app
  # Crypto layer + key management (moved in Week 8 Day 4). Constraints match
  # the consuming app's pubspec so a single resolution satisfies both.
  cryptography: ^2.7.0            # AES-256-GCM at-rest encryption — TechSpec §7
  cryptography_flutter: ^2.3.2    # Platform-native AES-GCM delegate — TechSpec §7
  flutter_secure_storage: ^9.2.2  # Android Keystore master-key store — TechSpec §6.2
  crypto: ^3.0.6                  # SHA-256 for the export audit hash — PRD §7.7
  # flutter_test is a *runtime* dependency on purpose: this package is test
  # infrastructure. privacyManifestTests() lives in lib/ (exported via
  # testing.dart) so any consuming app can run it through `flutter test`.
  flutter_test:
    sdk: flutter

dev_dependencies:
  flutter_lints: ^6.0.0

flutter:
